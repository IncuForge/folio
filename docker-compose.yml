# Folio — Self-Hosted Stack
# Storage: SeaweedFS (Apache 2.0) — S3-compatible, no AGPL concerns
# Database: PostgreSQL 16
# App: Next.js production image
#
# Usage:
#   cp .env.docker .env.local   # fill in your values
#   docker compose up -d
#
# Access:
#   App      → http://localhost:3000
#   SeaweedFS S3 API → http://localhost:8333
#   SeaweedFS UI     → http://localhost:9333

services:
  # ────────────────────────────────────────────────────
  # PostgreSQL 16
  # ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: folio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-folio}
      POSTGRES_USER: ${POSTGRES_USER:-folio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-folio_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically run schema on first boot
      - ./lib/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-folio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────
  # SeaweedFS — S3-compatible object storage
  # Apache 2.0 licensed (https://github.com/seaweedfs/seaweedfs)
  #
  # Runs in single-machine "server" mode with the S3 gateway enabled.
  # The S3 endpoint is exposed on port 8333.
  # ────────────────────────────────────────────────────
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: folio_storage
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json
    environment:
      # These are passed through to s3.json via entrypoint — see DOCKER_SETUP.md
      SEAWEEDFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-folio_access}
      SEAWEEDFS_SECRET_KEY: ${STORAGE_SECRET_KEY:-folio_secret_key}
    volumes:
      - seaweedfs_data:/data
      - ./docker/seaweedfs_s3.json:/etc/seaweedfs/s3.json:ro
    ports:
      - "9333:9333"   # Master UI / API
      - "8333:8333"   # S3 gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────
  # Folio Next.js App
  # ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folio_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Direct Postgres connection (skips Supabase entirely)
      DATABASE_URL: postgresql://${POSTGRES_USER:-folio}:${POSTGRES_PASSWORD:-folio_secret}@postgres:5432/${POSTGRES_DB:-folio}
      # S3-compatible storage via SeaweedFS
      STORAGE_ENDPOINT: http://seaweedfs:8333
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-folio_access}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-folio_secret_key}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-dish-images}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost:8333}
      # App secret for session signing (set a strong random value in production)
      SESSION_SECRET: ${SESSION_SECRET:-change_me_in_production}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  seaweedfs_data:
